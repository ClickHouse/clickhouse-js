name: "bun"

permissions: {}
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    paths:
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "tsconfig.dev.json"
      - "eslint.config.base.mjs"
      - "docker-compose.yml"
      - "packages/client-node/vitest.config.ts"
      - "packages/client-node/vitest.setup.ts"
      - "packages/client-web/vitest.config.ts"
      - "packages/client-web/vitest.setup.ts"
      - ".github/workflows/tests-bun.yml"
  pull_request:
    paths:
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "tsconfig.dev.json"
      - "eslint.config.base.mjs"
      - "docker-compose.yml"
      - "packages/client-node/vitest.config.ts"
      - "packages/client-node/vitest.setup.ts"
      - "packages/client-web/vitest.config.ts"
      - "packages/client-web/vitest.setup.ts"
      - ".github/workflows/tests-bun.yml"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  node-unit-tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: |
          bun install

      - name: Run node unit tests
        run: |
          npm run test:node:unit:bun
