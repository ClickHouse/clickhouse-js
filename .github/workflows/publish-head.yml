name: 'publish-head'

# Publish packages with 'head' tag on each merge to main
# Uses npm OIDC authentication with provenance support

permissions:
  contents: read
  id-token: write # Required for npm OIDC authentication and provenance

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main

jobs:
  publish-head:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Set head pre-release version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-common/package.json').version")
          HEAD_VERSION="${BASE_VERSION}-head.${GITHUB_SHA::7}"
          echo "Publishing version: $HEAD_VERSION"
          # Update all workspace package versions
          npm --workspaces version "$HEAD_VERSION" --no-git-tag-version
          # Update inter-workspace dependency on @clickhouse/client-common
          for package in packages/client-node packages/client-web; do
            json=$(cat "$package/package.json")
            echo "$json" | jq --arg version "$HEAD_VERSION" \
              '.dependencies["@clickhouse/client-common"] = $version' > "$package/package.json"
          done
          # Update version.ts files
          for package in packages/client-common packages/client-node packages/client-web; do
            echo "export default '$HEAD_VERSION'" > "$package/src/version.ts"
          done

      - name: Build packages
        run: npm --workspaces run build

      - name: Publish packages with head tag
        run: |
          npm --workspaces publish \
            --access public \
            --provenance \
            --tag head
