name: "publish"

# As NPM only supports a single workflow for publishing packages,
# this workflow is both triggered on push to the `release` branch and manually.
# When triggered manually, it will publish with the "latest" tag,
# and when triggered on push to `release`, it will publish with the "head" tag.
# The `main` branch is reserved for development and does not publish.
# For both it uses NPM OIDC authentication with provenance support.
#
# The manual ("latest") trigger accepts a `package` input so a single package can
# be published on its own - for example, a final release of the deprecated
# `@clickhouse/client-common`. The automatic head publish always releases every
# package together (they share the same head pre-release version).
#
# After a successful publish, the `e2e` job waits for the freshly published
# version to become available on the npm registry, installs that exact
# version into a tiny downstream project, and verifies it is usable.

permissions:
  contents: read
  id-token: write # Required for npm OIDC authentication and provenance

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true
on:
  # for the latest workflow
  workflow_dispatch:
    inputs:
      package:
        description: "Package(s) to publish"
        required: true
        default: all
        type: choice
        options:
          # Publish every package together (the default release flow).
          - all
          - "@clickhouse/client"
          - "@clickhouse/client-web"
          # The common package is deprecated, but can still be published on its own.
          - "@clickhouse/client-common"
  # for the head workflow
  push:
    branches:
      - release
    # Only run the head publishing workflow when files relevant to the
    # published packages change. The web and node packages bundle the
    # common package sources, so any change under packages/** triggers an
    # all-or-nothing publish of every package.
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "README.md"
      - "LICENSE"
      - "skills/**"
      - ".scripts/update_version.sh"
      - ".github/workflows/publish.yml"

jobs:
  head:
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    outputs:
      version: ${{ steps.version.outputs.version }}
      packages: ${{ steps.publish.outputs.packages }}
      client_published: ${{ steps.publish.outputs.client_published }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set head pre-release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-common/package.json').version")
          HEAD_VERSION="${BASE_VERSION}-head.${GITHUB_SHA::7}.${GITHUB_RUN_ATTEMPT}"
          echo "Setting version to: $HEAD_VERSION"
          .scripts/update_version.sh "$HEAD_VERSION"
          echo "version=$HEAD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: npm --workspaces run build

      - name: Publish packages with head tag
        id: publish
        run: |
          npm --workspaces publish \
            --access public \
            --provenance \
            --tag head
          {
            echo "packages=@clickhouse/client-common @clickhouse/client @clickhouse/client-web"
            echo "client_published=true"
          } >> "$GITHUB_OUTPUT"

  latest:
    if: github.ref == 'refs/heads/release' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # Required to push the release git tag
      id-token: write # Required for npm OIDC authentication and provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      packages: ${{ steps.target.outputs.packages }}
      client_published: ${{ steps.target.outputs.client_published }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Resolve target package(s)
        id: target
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          case "$PACKAGE" in
            all)
              packages="@clickhouse/client-common @clickhouse/client @clickhouse/client-web"
              ws_flags="--workspaces"
              version_source="packages/client-common/package.json"
              ;;
            "@clickhouse/client")
              packages="@clickhouse/client"
              ws_flags="--workspace @clickhouse/client"
              version_source="packages/client-node/package.json"
              ;;
            "@clickhouse/client-web")
              packages="@clickhouse/client-web"
              ws_flags="--workspace @clickhouse/client-web"
              version_source="packages/client-web/package.json"
              ;;
            "@clickhouse/client-common")
              packages="@clickhouse/client-common"
              ws_flags="--workspace @clickhouse/client-common"
              version_source="packages/client-common/package.json"
              ;;
            *)
              echo "Unknown package: $PACKAGE" >&2
              exit 1
              ;;
          esac
          client_published=false
          case " $packages " in
            *" @clickhouse/client "*) client_published=true ;;
          esac
          {
            echo "packages=$packages"
            echo "ws_flags=$ws_flags"
            echo "version_source=$version_source"
            echo "client_published=$client_published"
          } >> "$GITHUB_OUTPUT"

      - name: Get the release version
        id: version
        env:
          VERSION_SOURCE: ${{ steps.target.outputs.version_source }}
        run: |
          BASE_VERSION=$(node -p "require('./${VERSION_SOURCE}').version")
          echo "Using version: $BASE_VERSION"
          echo "version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build packages
        run: npm --workspaces run build

      - name: Publish packages to the latest tag (implicit)
        env:
          WS_FLAGS: ${{ steps.target.outputs.ws_flags }}
        run: |
          # shellcheck disable=SC2086 # WS_FLAGS is an intentional npm flag list.
          npm $WS_FLAGS publish \
            --access public \
            --provenance

      - name: Create and push release git tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ inputs.package }}
        run: |
          if [ "$PACKAGE" = "all" ]; then
            TAG="${RELEASE_VERSION}"
          else
            # Scope the tag to the package so single-package releases do not
            # collide with the shared release tag.
            SLUG="${PACKAGE#@clickhouse/}"
            TAG="${SLUG}-${RELEASE_VERSION}"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

  e2e:
    name: e2e (node ${{ matrix.node }})
    needs: [head, latest]
    # Run when a publish job succeeded and the Node.js client was among the
    # published packages (the e2e project imports `@clickhouse/client`).
    if: |
      always() &&
      (needs.head.result == 'success' || needs.latest.result == 'success') &&
      ((needs.head.outputs.client_published || needs.latest.outputs.client_published) == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node: [20, 22, 24]
    defaults:
      run:
        working-directory: tests/e2e/install
    env:
      PUBLISHED_VERSION: ${{ needs.head.outputs.version || needs.latest.outputs.version }}
      PUBLISHED_PACKAGES: ${{ needs.head.outputs.packages || needs.latest.outputs.packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup NodeJS ${{ matrix.node }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          registry-url: "https://registry.npmjs.org"

      - name: Wait for ${{ env.PUBLISHED_VERSION }} to be available on npm
        run: |
          set -euo pipefail
          if [ -z "${PUBLISHED_VERSION}" ]; then
            echo "PUBLISHED_VERSION is empty; cannot wait for npm publication." >&2
            exit 1
          fi
          if [ -z "${PUBLISHED_PACKAGES}" ]; then
            echo "PUBLISHED_PACKAGES is empty; cannot wait for npm publication." >&2
            exit 1
          fi
          read -r -a packages <<< "${PUBLISHED_PACKAGES}"
          # Poll the registry for up to ~5 minutes per package. New versions
          # usually surface in seconds, but the registry CDN can lag.
          max_attempts=60
          sleep_seconds=5
          for pkg in "${packages[@]}"; do
            echo "Waiting for ${pkg}@${PUBLISHED_VERSION} to be available on npm..."
            attempt=1
            while true; do
              if npm view "${pkg}@${PUBLISHED_VERSION}" version >/dev/null 2>&1; then
                echo "  ${pkg}@${PUBLISHED_VERSION} is available."
                break
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Timed out waiting for ${pkg}@${PUBLISHED_VERSION} on npm" >&2
                exit 1
              fi
              echo "  attempt ${attempt}/${max_attempts}: not available yet, sleeping ${sleep_seconds}s..."
              attempt=$((attempt + 1))
              sleep "$sleep_seconds"
            done
          done

      - name: Install dependencies
        run: npm install

      - name: Install the packages at the published version
        run: |
          set -euo pipefail
          read -r -a packages <<< "${PUBLISHED_PACKAGES}"
          specs=()
          for pkg in "${packages[@]}"; do
            specs+=("${pkg}@${PUBLISHED_VERSION}")
          done
          npm install "${specs[@]}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Run client code
        env:
          EXPECTED_VERSION: ${{ env.PUBLISHED_VERSION }}
        run: node src/index.ts
