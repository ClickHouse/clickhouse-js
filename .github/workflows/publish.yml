name: "publish"

# As NPM only supports a single workflow for publishing packages,
# this workflow is both triggered on push to the `release` branch and manually.
# When triggered manually, it will publish with the "latest" tag,
# and when triggered on push to `release`, it will publish with the "head" tag.
# The `main` branch is reserved for development and does not publish.
# For both it uses NPM OIDC authentication with provenance support.
#
# The manual ("latest") trigger takes a required `package` input and runs the
# matching per-package job, so a single package can be published on its own -
# for example, a final release of the deprecated `@clickhouse/client-common`.
# The automatic head publish runs one per-package job for every package (each
# computes its own `<base>-head.<sha>.<attempt>` version from its package.json).
#
# Before each Node.js client publish, a smoke test packs the freshly built
# package into a tarball, installs that tarball into a throwaway app, and runs
# ESM + CJS checks against it (.scripts/smoke_test_pack.sh). This catches
# packaging problems before anything reaches npm.
#
# After a successful publish, the `e2e` job waits for the freshly published
# version to become available on the npm registry, installs that exact
# version into a tiny downstream project, and verifies it is usable. It only
# runs when `@clickhouse/client` was published (the head job or the client job).

permissions:
  contents: read
  id-token: write # Required for npm OIDC authentication and provenance

concurrency:
  # Scope manual publishes by package so dispatching a release for one package
  # does not cancel an in-progress release of another. `github.event.inputs` is
  # empty for the head (push) trigger, so head runs still share a single group.
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}-${{ github.event.inputs.package }}
  cancel-in-progress: true
on:
  # for the latest workflow
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - "@clickhouse/client"
          - "@clickhouse/client-web"
          # The common package is deprecated, but can still be published on its own.
          - "@clickhouse/client-common"
  # for the head workflow
  push:
    branches:
      - release
    # Only run the head publishing workflow when files relevant to the
    # published packages change. The web and node packages bundle the
    # common package sources, so any change under packages/** triggers an
    # all-or-nothing publish of every package.
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "README.md"
      - "LICENSE"
      - "skills/**"
      - ".github/workflows/publish.yml"

env:
  # Network resilience: npm's default of 2 fetch retries is not enough for
  # the transient registry errors (ECONNRESET) we regularly hit in CI.
  NPM_CONFIG_FETCH_RETRIES: "5"
  NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
  NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "60000"
  NPM_CONFIG_FETCH_TIMEOUT: "600000"

jobs:
  head_client:
    name: "Publish @clickhouse/client (head)"
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    outputs:
      version: ${{ steps.version.outputs.version }}
      packages: "@clickhouse/client"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set head pre-release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-node/package.json').version")
          HEAD_VERSION="${BASE_VERSION}-head.${GITHUB_SHA::7}.${GITHUB_RUN_ATTEMPT}"
          echo "Setting version to: $HEAD_VERSION"
          npm --workspace @clickhouse/client version --no-git-tag-version "$HEAD_VERSION"
          echo "export default \"$HEAD_VERSION\";" > packages/client-node/src/version.ts
          echo "version=$HEAD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build the package
        run: npm --workspace @clickhouse/client run build

      - name: Smoke test the packed tarball
        run: .scripts/smoke_test_pack.sh @clickhouse/client

      - name: Publish @clickhouse/client with head tag
        run: |
          npm --workspace @clickhouse/client publish \
            --access public \
            --provenance \
            --tag head

  head_client_web:
    name: "Publish @clickhouse/client-web (head)"
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set head pre-release version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-web/package.json').version")
          HEAD_VERSION="${BASE_VERSION}-head.${GITHUB_SHA::7}.${GITHUB_RUN_ATTEMPT}"
          echo "Setting version to: $HEAD_VERSION"
          npm --workspace @clickhouse/client-web version --no-git-tag-version "$HEAD_VERSION"
          echo "export default \"$HEAD_VERSION\";" > packages/client-web/src/version.ts

      - name: Build the package
        run: npm --workspace @clickhouse/client-web run build

      - name: Publish @clickhouse/client-web with head tag
        run: |
          npm --workspace @clickhouse/client-web publish \
            --access public \
            --provenance \
            --tag head

  head_client_common:
    name: "Publish @clickhouse/client-common (head)"
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set head pre-release version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-common/package.json').version")
          HEAD_VERSION="${BASE_VERSION}-head.${GITHUB_SHA::7}.${GITHUB_RUN_ATTEMPT}"
          echo "Setting version to: $HEAD_VERSION"
          npm --workspace @clickhouse/client-common version --no-git-tag-version "$HEAD_VERSION"
          echo "export default \"$HEAD_VERSION\";" > packages/client-common/src/version.ts

      - name: Build the package
        run: npm --workspace @clickhouse/client-common run build

      - name: Publish @clickhouse/client-common with head tag
        run: |
          npm --workspace @clickhouse/client-common publish \
            --access public \
            --provenance \
            --tag head

  publish_client:
    name: "Publish @clickhouse/client"
    if: github.ref == 'refs/heads/release' && github.event_name == 'workflow_dispatch' && inputs.package == '@clickhouse/client'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # Required to push the release git tag
      id-token: write # Required for npm OIDC authentication and provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      packages: "@clickhouse/client"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Get the release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-node/package.json').version")
          echo "Using version: $BASE_VERSION"
          echo "version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build the package
        run: npm --workspace @clickhouse/client run build

      - name: Smoke test the packed tarball
        run: .scripts/smoke_test_pack.sh @clickhouse/client

      - name: Publish @clickhouse/client to the latest tag (implicit)
        run: |
          npm --workspace @clickhouse/client publish \
            --access public \
            --provenance

      - name: Create and push release git tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: .scripts/push_release_tag.sh "client-${RELEASE_VERSION}"

  publish_client_web:
    name: "Publish @clickhouse/client-web"
    if: github.ref == 'refs/heads/release' && github.event_name == 'workflow_dispatch' && inputs.package == '@clickhouse/client-web'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # Required to push the release git tag
      id-token: write # Required for npm OIDC authentication and provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      packages: "@clickhouse/client-web"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Get the release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-web/package.json').version")
          echo "Using version: $BASE_VERSION"
          echo "version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build the package
        run: npm --workspace @clickhouse/client-web run build

      - name: Publish @clickhouse/client-web to the latest tag (implicit)
        run: |
          npm --workspace @clickhouse/client-web publish \
            --access public \
            --provenance

      - name: Create and push release git tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: .scripts/push_release_tag.sh "client-web-${RELEASE_VERSION}"

  publish_client_common:
    name: "Publish @clickhouse/client-common (deprecated)"
    if: github.ref == 'refs/heads/release' && github.event_name == 'workflow_dispatch' && inputs.package == '@clickhouse/client-common'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write # Required to push the release git tag
      id-token: write # Required for npm OIDC authentication and provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
      packages: "@clickhouse/client-common"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Get the release version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/client-common/package.json').version")
          echo "Using version: $BASE_VERSION"
          echo "version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build the package
        run: npm --workspace @clickhouse/client-common run build

      - name: Publish @clickhouse/client-common to the latest tag (implicit)
        run: |
          npm --workspace @clickhouse/client-common publish \
            --access public \
            --provenance

      - name: Create and push release git tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: .scripts/push_release_tag.sh "client-common-${RELEASE_VERSION}"

  e2e:
    name: e2e (node ${{ matrix.node }})
    needs: [head_client, publish_client]
    # The e2e project imports `@clickhouse/client`, so it only runs when the
    # Node.js client was published - either via the head job or the client job.
    if: |
      always() &&
      (needs.head_client.result == 'success' || needs.publish_client.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node: [20, 22, 24, 26]
    defaults:
      run:
        working-directory: tests/e2e/install
    env:
      PUBLISHED_VERSION: ${{ needs.head_client.outputs.version || needs.publish_client.outputs.version }}
      PUBLISHED_PACKAGES: ${{ needs.head_client.outputs.packages || needs.publish_client.outputs.packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Start ClickHouse (stable) in Docker
        uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        env:
          CLICKHOUSE_VERSION: latest
        with:
          compose-file: "docker-compose.yml"
          down-flags: "--volumes"

      - name: Setup NodeJS ${{ matrix.node }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          registry-url: "https://registry.npmjs.org"

      - name: Wait for ${{ env.PUBLISHED_VERSION }} to be available on npm
        run: |
          set -euo pipefail
          if [ -z "${PUBLISHED_VERSION}" ]; then
            echo "PUBLISHED_VERSION is empty; cannot wait for npm publication." >&2
            exit 1
          fi
          if [ -z "${PUBLISHED_PACKAGES}" ]; then
            echo "PUBLISHED_PACKAGES is empty; cannot wait for npm publication." >&2
            exit 1
          fi
          read -r -a packages <<< "${PUBLISHED_PACKAGES}"
          # Poll the registry for up to ~5 minutes per package. New versions
          # usually surface in seconds, but the registry CDN can lag.
          max_attempts=60
          sleep_seconds=5
          for pkg in "${packages[@]}"; do
            echo "Waiting for ${pkg}@${PUBLISHED_VERSION} to be available on npm..."
            attempt=1
            while true; do
              if npm view "${pkg}@${PUBLISHED_VERSION}" version >/dev/null 2>&1; then
                echo "  ${pkg}@${PUBLISHED_VERSION} is available."
                break
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Timed out waiting for ${pkg}@${PUBLISHED_VERSION} on npm" >&2
                exit 1
              fi
              echo "  attempt ${attempt}/${max_attempts}: not available yet, sleeping ${sleep_seconds}s..."
              attempt=$((attempt + 1))
              sleep "$sleep_seconds"
            done
          done

      - name: Install dependencies
        run: npm install

      - name: Install the packages at the published version
        run: |
          set -euo pipefail
          read -r -a packages <<< "${PUBLISHED_PACKAGES}"
          specs=()
          for pkg in "${packages[@]}"; do
            specs+=("${pkg}@${PUBLISHED_VERSION}")
          done
          npm install "${specs[@]}"

      - name: Type check
        run: npx tsc --noEmit

      - name: Run client code
        env:
          EXPECTED_VERSION: ${{ env.PUBLISHED_VERSION }}
        run: node src/index.ts

      # End-to-end integration against the installed package and a live
      # single-node ClickHouse (started above): create/insert/select, stream,
      # and confirm a bad query surfaces as a ClickHouseError.
      - name: Run integration tests against the published package
        run: node src/integration.ts
