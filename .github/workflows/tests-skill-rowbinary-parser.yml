name: "skill: rowbinary parser"

permissions: {}
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tests-skill-rowbinary-parser.yml
      - skills/clickhouse-js-node-rowbinary-parser/**
  pull_request:
    paths:
      - .github/workflows/tests-skill-rowbinary-parser.yml
      - skills/clickhouse-js-node-rowbinary-parser/**

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  typecheck:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/clickhouse-js-node-rowbinary-parser
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  unit-tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/clickhouse-js-node-rowbinary-parser
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
        clickhouse: [head, latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Start ClickHouse (version - ${{ matrix.clickhouse }}) in Docker
        uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        env:
          CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}
        with:
          # The skill suite only needs the single-node HTTP server on :8123.
          compose-file: "docker-compose.yml"
          services: "clickhouse"
          down-flags: "--volumes"

      - name: Setup NodeJS ${{ matrix.node }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
