name: 'build'

permissions: {}
on: [push]

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install

      - name: Build packages
        run: |
          npm --workspaces run build

      - name: Pack packages
        run: |
          npm --workspaces pack

      - name: Rename artifacts
        run: |
          mkdir -p packs
          mv clickhouse-client-common-*.tgz packs/clickhouse-client-common.tgz
          mv clickhouse-client-web-*.tgz packs/clickhouse-client-web.tgz
          mv clickhouse-client-*.tgz packs/clickhouse-client.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: clickhouse-js-packages
          path: packs/*
